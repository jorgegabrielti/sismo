version: '3.8'

services:
  sismo-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sismo-monitor
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Repassa a variável de token do ambiente do host
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # Conexão com o banco Postgres rodando no outro container
      - DATABASE_URL=postgres://postgres:postgres@sismo-db:5432/sismo?sslmode=disable
      # Configurações padrão (foco na Venezuela)
      - MIN_MAGNITUDE=4.5
      - MONITOR_INTERVAL=1m
      - MIN_LATITUDE=0.5
      - MAX_LATITUDE=12.5
      - MIN_LONGITUDE=-73.5
      - MAX_LONGITUDE=-59.5
    depends_on:
      - sismo-db

  sismo-db:
    image: postgres:15-alpine
    container_name: sismo-db
    restart: unless-stopped
    ports:
      - "5432:5432" # Expõe a porta para o host para caso queira inspecionar externamente
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sismo
    volumes:
      # Mantém os dados do banco persistentes no disco do host
      - sismo_db_data:/var/lib/postgresql/data

volumes:
  sismo_db_data:
    name: sismo_db_data_volume
